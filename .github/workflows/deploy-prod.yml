name: Deploy Insight Frontend to Production

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    uses: Neonbee-ai/neonbee-devops/.github/workflows/neonbee-deploy-prod-vite-mfe.yml@main
    with:
      service_name: insight-fe
      nginx_root: /var/www/cdn.neonbee.app/html/insight
      needs_shell_packages: true
      is_shell: false
      cf_purge_urls: 'https://cdn.neonbee.app/insight/assets/remoteEntry.js,https://cdn.neonbee.app/insight/index.html'
      vite_env: |
        VITE_BASE_URL=https://cdn.neonbee.app/insight/
        VITE_SO360_CORE_API=https://api.neonbee.app/core
        VITE_SO360_INSIGHT_API=https://api.neonbee.app/insight
        VITE_ENVIRONMENT=cloud
    secrets: inherit
